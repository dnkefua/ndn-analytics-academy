<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Firebase App Hosting Lab 7 green rollout exercise map</title>
  <desc id="desc">A production launch flow showing GitHub commit, apphosting.yaml secret binding, Cloud Build, Cloud Run revision, rollout health checks, and a live hosted app URL.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101827"/>
      <stop offset="0.54" stop-color="#132331"/>
      <stop offset="1" stop-color="#092d32"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 800 40px Inter, Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 18px Inter, Arial, sans-serif; fill: #b6c2d1; }
      .card { fill: rgba(15, 23, 42, 0.82); stroke: rgba(148, 163, 184, 0.35); stroke-width: 1.2; rx: 18; filter: url(#shadow); }
      .cardTitle { font: 800 22px Inter, Arial, sans-serif; fill: #f8fafc; }
      .cardBody { font: 500 15px Inter, Arial, sans-serif; fill: #cbd5e1; }
      .code { font: 600 15px "JetBrains Mono", Consolas, monospace; fill: #a7f3d0; }
      .pill { fill: rgba(20, 184, 166, 0.12); stroke: rgba(45, 212, 191, 0.65); stroke-width: 1; rx: 14; }
      .pillText { font: 800 13px Inter, Arial, sans-serif; fill: #67e8f9; letter-spacing: 0.4px; }
      .arrow { stroke: #38bdf8; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .small { font: 700 13px Inter, Arial, sans-serif; fill: #93a4b8; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M 0 580 C 210 520 275 684 495 630 C 705 580 810 485 1030 540 C 1145 569 1210 630 1280 600 L 1280 720 L 0 720 Z" fill="rgba(20,184,166,0.10)"/>

  <text x="64" y="74" class="title">Lab 7 Production Launch: Green Rollout Evidence</text>
  <text x="64" y="108" class="subtitle">Connect GitHub, bind secrets in apphosting.yaml, push to the live branch, and prove the hosted app is healthy.</text>

  <rect x="64" y="158" width="242" height="170" class="card"/>
  <rect x="90" y="184" width="84" height="28" class="pill"/>
  <text x="105" y="204" class="pillText">SOURCE</text>
  <text x="90" y="244" class="cardTitle">GitHub Repo</text>
  <text x="90" y="276" class="cardBody">Live branch: main</text>
  <text x="90" y="302" class="cardBody">Root directory: /</text>

  <rect x="384" y="158" width="256" height="170" class="card"/>
  <rect x="410" y="184" width="92" height="28" class="pill"/>
  <text x="425" y="204" class="pillText">CONFIG</text>
  <text x="410" y="244" class="cardTitle">apphosting.yaml</text>
  <text x="410" y="277" class="code">secret: geminiApiKey</text>
  <text x="410" y="303" class="code">availability: [RUNTIME]</text>

  <rect x="718" y="158" width="226" height="170" class="card"/>
  <rect x="744" y="184" width="80" height="28" class="pill"/>
  <text x="759" y="204" class="pillText">BUILD</text>
  <text x="744" y="244" class="cardTitle">Cloud Build</text>
  <text x="744" y="276" class="cardBody">Detect framework</text>
  <text x="744" y="302" class="cardBody">Create container image</text>

  <rect x="1030" y="158" width="186" height="170" class="card"/>
  <rect x="1056" y="184" width="66" height="28" class="pill"/>
  <text x="1070" y="204" class="pillText">RUN</text>
  <text x="1056" y="244" class="cardTitle">Cloud Run</text>
  <text x="1056" y="276" class="cardBody">New revision</text>
  <text x="1056" y="302" class="cardBody">PORT + health</text>

  <path d="M 314 243 H 366" class="arrow"/>
  <path d="M 650 243 H 700" class="arrow"/>
  <path d="M 954 243 H 1012" class="arrow"/>

  <rect x="184" y="426" width="252" height="152" class="card"/>
  <text x="212" y="475" class="cardTitle">Secret Manager</text>
  <text x="212" y="509" class="cardBody">Secret value stays outside git.</text>
  <text x="212" y="535" class="cardBody">Backend service account gets access.</text>
  <path d="M 406 426 C 480 360 492 335 512 328" class="arrow"/>

  <rect x="514" y="426" width="272" height="152" class="card"/>
  <text x="542" y="474" class="cardTitle">Rollout Check</text>
  <text x="542" y="508" class="cardBody">Build link, commit link, status row.</text>
  <text x="542" y="534" class="cardBody">Target: Current rollout is healthy.</text>
  <circle cx="736" cy="468" r="22" fill="url(#ok)"/>
  <path d="M 726 467 L 734 476 L 750 456" stroke="#052e16" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 1130 328 C 1115 386 948 470 806 498" class="arrow"/>

  <rect x="864" y="426" width="316" height="152" class="card"/>
  <text x="892" y="474" class="cardTitle">Live URL Evidence</text>
  <text x="892" y="508" class="cardBody">https://backend--project.region.hosted.app</text>
  <text x="892" y="534" class="cardBody">HTTP 200, no secret leakage, feature works.</text>

  <text x="64" y="652" class="small">Submission packet: apphosting.yaml, Firebase rollout screenshot, live URL, curl -I output, redacted secret-binding proof, reflection.</text>
</svg>
