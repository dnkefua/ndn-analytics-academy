name: NDN Analytics Academy CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate_and_build:
    name: 🧪 CI Validation & Production Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Codebase
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: ⚙️ Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔍 TypeScript Type Check
        run: npm run lint

      - name: ⚡ Production Vite & Server Build
        run: npm run build

      - name: 📋 Verify App Hosting Artifacts
        run: |
          test -f dist/index.html || (echo "Missing dist/index.html!" && exit 1)
          test -f dist/server.cjs || (echo "Missing dist/server.cjs!" && exit 1)
          test -f apphosting.yaml || (echo "Missing apphosting.yaml!" && exit 1)
          test -f .firebaserc || (echo "Missing .firebaserc!" && exit 1)
          echo "✅ All production artifacts verified successfully."

  app_hosting_deployment_status:
    name: 🚀 Firebase App Hosting CD Pipeline
    needs: validate_and_build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Codebase
        uses: actions/checkout@v4

      - name: 🌐 Output Live App Hosting Links
        run: |
          echo "=========================================================================="
          echo "🎉 CI Validation PASSED!"
          echo "🚀 Firebase App Hosting is automatically building the container."
          echo "🔗 Production URL: https://ndn-analytics-academy--ndn-analytics-academy.us-east4.hosted.app"
          echo "=========================================================================="
